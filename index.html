<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dino Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  display: block;
}

#gameOverScreen {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: rgba(0,0,0,0.6);
  color: white;
  font-family: Arial;
}

#gameOverScreen h1 {
  font-size: 60px;
  margin: 0;
}

#gameOverScreen button {
  margin-top: 20px;
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #00c853;
  color: white;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="gameOverScreen">
  <h1>Game Over</h1>
  <button onclick="resetGame()">Reiniciar</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== MUNDO =====
const W = 800;
const H = 400;

let scale = 1;

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  scale = Math.min(
    canvas.width / W,
    canvas.height / H
  );
}
window.addEventListener("resize", resize);
resize();

// ===== AUDIO =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function unlockAudio(){
  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }
}

function playBeep(freq, duration=0.1, type="square", volume=0.1){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = type;
  osc.frequency.value = freq;

  gain.gain.value = volume;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function soundJump(){
  playBeep(500,0.08,"square",0.08);
}

function soundHit(){
  playBeep(120,0.25,"sawtooth",0.2);
}

// ===== MÚSICA =====
const music = new Audio("music.mp3");
music.loop = true;
music.volume = 0.25;

let musicStarted = false;

function startMusic(){
  unlockAudio();

  if(!musicStarted){
    music.play().then(()=>musicStarted=true).catch(()=>{});
  }
}

// ===== BACKGROUNDS (SEQUÊNCIA) =====
const backgrounds = [
  "fundo.jpg",
  "fundo2.jpeg"
];

let bgIndex = 0;
let bgX = 0;
const bgSpeed = 1;

// ===== IMAGENS =====
const dinoImg = new Image();
dinoImg.src = "dino.png";

const cactusImgs = ["cacto1.jpg","cacto2.jpeg","cacto3.jpg","cacto4.jpg"];
const birdImgs = ["bird1.jpg","bird2.jpeg","bird3.jpg","bird4.jpg"];

function rand(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

// ===== GAME =====
let running = true;
let score = 0;

const groundY = 340;

const dino = {
  x: 80,
  y: groundY - 50,
  w: 50,
  h: 50,
  dy: 0,
  jumping:false,
  crouching:false
};

let obstacles = [];

// ===== CONTROLES =====
document.addEventListener("keydown",(e)=>{
  startMusic();

  if(!running) return;

  if(e.code==="Space" && !dino.jumping && !dino.crouching){
    dino.dy = -14;
    dino.jumping = true;
    soundJump();
  }

  if(e.key.toLowerCase()==="s" && !dino.jumping){
    dino.crouching = true;
    dino.h = 25;
  }
});

document.addEventListener("keyup",(e)=>{
  if(e.key.toLowerCase()==="s"){
    dino.crouching = false;
    dino.h = 50;
  }
});

// ===== UPDATE =====
function update(){
  if(!running) return;

  score += 0.1;

  // física
  dino.dy += 0.7;
  dino.y += dino.dy;

  if(dino.y >= groundY - dino.h){
    dino.y = groundY - dino.h;
    dino.dy = 0;
    dino.jumping = false;
  }

  if(dino.crouching){
    dino.y = groundY - dino.h;
  }

  // inimigos
  obstacles.forEach(o => o.x -= 7);
  obstacles = obstacles.filter(o => o.x > -100);

  obstacles.forEach(o=>{
    if(
      dino.x < o.x + o.w &&
      dino.x + dino.w > o.x &&
      dino.y < o.y + o.h &&
      dino.y + dino.h > o.y
    ){
      gameOver();
    }
  });

  // ===== BACKGROUND LOOP SEQUENCIAL =====
  bgX -= bgSpeed;

  if(bgX <= -W){
    bgX = 0;
    bgIndex = (bgIndex + 1) % backgrounds.length;
  }
}

// ===== DRAW =====
function draw(){

  ctx.setTransform(
    scale,0,0,scale,
    (canvas.width - W*scale)/2,
    (canvas.height - H*scale)/2
  );

  // ===== BACKGROUND =====
  const img = new Image();
  img.src = backgrounds[bgIndex];

  const nextImg = new Image();
  nextImg.src = backgrounds[(bgIndex + 1) % backgrounds.length];

  if(img.complete){
    ctx.drawImage(img, bgX, 0, W, H);
  }

  if(nextImg.complete){
    ctx.drawImage(nextImg, bgX + W, 0, W, H);
  }

  // chão areia
  ctx.fillStyle="#d9b46b";
  ctx.fillRect(0,groundY,W,H-groundY);

  ctx.fillStyle="#caa25a";
  ctx.fillRect(0,groundY,W,8);

  ctx.fillStyle="rgba(0,0,0,0.08)";
  for(let i=0;i<60;i++){
    const x=(i*80)%W;
    const y=groundY+(i%3)*6;
    ctx.fillRect(x,y,3,2);
  }

  // score
  ctx.fillStyle="black";
  ctx.font="20px Arial";
  ctx.fillText("Score: "+Math.floor(score),W-150,40);

  // dino
  ctx.drawImage(dinoImg,dino.x,dino.y,dino.w,dino.h);

  // inimigos
  obstacles.forEach(o=>{
    const img = new Image();
    img.src = o.img;
    ctx.drawImage(img,o.x,o.y,o.w,o.h);
  });
}

// ===== LOOP =====
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// ===== SPAWN =====
setInterval(()=>{
  if(!running) return;

  const r = Math.random();

  if(r < 0.4){
    obstacles.push({x:800,y:groundY-40,w:40,h:40,img:rand(cactusImgs)});
  }
  else if(r < 0.7){
    obstacles.push({x:800,y:groundY-55,w:50,h:50,img:rand(cactusImgs)});
  }
  else if(r < 0.85){
    obstacles.push({x:800,y:groundY-60,w:40,h:25,img:rand(birdImgs)});
  }
  else{
    obstacles.push({x:800,y:groundY-120,w:40,h:30,img:rand(birdImgs)});
  }

},1200);

// ===== GAME OVER =====
function gameOver(){
  running=false;

  music.pause();
  music.currentTime=0;

  soundHit();

  document.getElementById("gameOverScreen").style.display="flex";
}

// ===== RESET =====
function resetGame(){
  obstacles=[];
  score=0;
  running=true;
  musicStarted=false;

  document.getElementById("gameOverScreen").style.display="none";
}

loop();
</script>

</body>
</html>
